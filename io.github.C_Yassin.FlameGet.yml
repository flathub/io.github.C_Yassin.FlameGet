app-id: io.github.C_Yassin.FlameGet
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: start-flameget
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --share=network
  - --filesystem=xdg-download
cleanup:
  - /share/bash-completion
  - /share/doc
  - /share/fish
  - /share/man
  - /share/zsh
modules:
  - name: aria2
    buildsystem: autotools
    config-opts:
      - --disable-libaria2
    sources:
      - type: archive
        url: https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0.tar.xz
        sha256: 60a420ad7085eb616cb6e2bdf0a7206d68ff3d37fb5a956dc44242eb2f79b66b
  
  - python3-requirements.json
  
  - name: rustypipe-botguard-x86_64
    only-arches: [x86_64]
    buildsystem: simple
    build-commands:
      - BINARY_PATH=$(find . -type f -name "*rustypipe-botguard*" | head -n 1) && install -D -m 755 "$BINARY_PATH" /app/share/flameget/binaries/rustypipe-botguard
    sources:
      - type: archive
        url: https://codeberg.org/ThetaDev/rustypipe-botguard/releases/download/v0.1.2/rustypipe-botguard-v0.1.2-x86_64-unknown-linux-gnu.tar.xz
        sha256: 4f2ec561e8f9fadece7deadc6ce0624fbdedd852222c3eb194c22153b1323129
        strip-components: 0

  - name: rustypipe-botguard-aarch64
    only-arches: [aarch64]
    buildsystem: simple
    build-commands:
      - BINARY_PATH=$(find . -type f -name "*rustypipe-botguard*" | head -n 1) && install -D -m 755 "$BINARY_PATH" /app/share/flameget/binaries/rustypipe-botguard
    sources:
      - type: archive
        url: https://codeberg.org/ThetaDev/rustypipe-botguard/releases/download/v0.1.2/rustypipe-botguard-v0.1.2-aarch64-unknown-linux-gnu.tar.xz
        sha256: 4d038857374a69aea9be8ded981d93a776dc88d4e254f5c6d292746099abf69a
        strip-components: 0
  - name: flameget
    buildsystem: simple

    build-commands:
        - mkdir -p /app/share/flameget
        - cp -r * /app/share/flameget/

        - install -D -m 755 flatpak-flameget.sh /app/bin/start-flameget
        
        - install -Dm644 io.github.C_Yassin.FlameGet.metainfo.xml /app/share/metainfo/io.github.C_Yassin.FlameGet.metainfo.xml
        - install -Dm644 app-icon-flatpack.svg /app/share/icons/hicolor/scalable/apps/io.github.C_Yassin.FlameGet.svg
        - install -Dm644 io.github.C_Yassin.FlameGet.desktop /app/share/applications/io.github.C_Yassin.FlameGet.desktop

    sources:
      - type: git
        url: https://github.com/C-Yassin/FlameGet
        commit: 9985f7228486b9c6166733b97ab2d8958cab3f2f
